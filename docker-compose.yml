services:
  orchestrator:
    build: .
    container_name: agent-orchestrator
    ports:
      - "8888:8888"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      - AI_MODEL=${AI_MODEL:-claude-sonnet-4-20250514}
      - HOST=0.0.0.0
      - PORT=8888
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    volumes:
      - ./data/repos:/app/data/repos
      - ./data/indexes:/app/data/indexes
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: agent-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 10s
    restart: unless-stopped

volumes:
  qdrant_data:
